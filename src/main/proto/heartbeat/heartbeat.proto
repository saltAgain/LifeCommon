syntax = "proto3";
package life;

import "common/enums.proto";

option java_package = "dev.saltt.common.api.proto";
option java_multiple_files = true;

message SubHeartbeatMessage {
  string       match_id = 1;
  LifeGameType game_type = 2;
  repeated string players = 3;       //uuid
  GameStatus   status = 4;
}