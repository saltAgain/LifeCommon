syntax = "proto3";
package life;

import "lifecycle/heartbeat/heartbeat.proto";

option java_package = "dev.saltt.common.api.proto";
option java_multiple_files = true;

service HeartbeatService {
  rpc Heartbeat(SubHeartbeatMessage) returns (HeartbeatAck);
}

message HeartbeatAck {
  bool acknowledged = 1;
}