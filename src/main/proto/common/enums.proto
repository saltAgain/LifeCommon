syntax = "proto3";
package life;

option java_package = "dev.saltt.common.api.proto";
option java_multiple_files = true;

//dont renumber
enum LifeGameType {
  LIFE_GAME_TYPE_UNSPECIFIED = 0;
  SURVIVAL_GAMES = 1;
}

enum GameStatus {
  GAME_STATUS_UNSPECIFIED = 0;   // "unset" default — kept as the sentinel
  PRE_GAME = 1;
  STARTING = 2;
  IN_PROGRESS = 3;
  ENDING = 4;
  ENDED = 5;
  SERVER_LOADING = 6;
  SERVER_CLOSING = 7;
}