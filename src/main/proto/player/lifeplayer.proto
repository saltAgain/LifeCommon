syntax = "proto3";
package life;

import "google/protobuf/timestamp.proto";

option java_package = "dev.saltt.common.api.proto";
option java_multiple_files = true;

message LifePlayerMessage {

  string uuid = 1;
  string display_name = 2;
  google.protobuf.Timestamp first_join = 3;
  google.protobuf.Timestamp last_joined = 4;
  repeated string past_names = 5;
  repeated string used_ips = 6;
}
