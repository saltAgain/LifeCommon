syntax = "proto3";
package life;

import "flush/minigame/common/stats.proto";
import "heartbeat/heartbeat.proto";
import "flush/minigame/survival_games_player_flush.proto";
import "google/protobuf/timestamp.proto";

option java_package = "dev.saltt.common.api.proto";
option java_multiple_files = true;

message FlushEnvelope {
  string match_id = 1;
  string server_id = 2;
  string map_name = 3;
  string region = 4;
  google.protobuf.Timestamp start_time_nano = 5;
  google.protobuf.Timestamp end_time_nano = 6;

  oneof payload {
    SurvivalGamesPayload survival_games_payload = 7;
  }

  repeated PvpStatsMessage stats = 10;
}