syntax = "proto3";
package life;

import "common/stats.proto";
import "heartbeat/heartbeat.proto";
import "flush/minigame/sg_flush.proto";

option java_package = "dev.saltt.common.api.proto";
option java_multiple_files = true;

message FlushEnvelope {
  oneof payload {
    SurvivalGamesMatchMessage survival_games = 1;
  }

  repeated PvpStatsMessage stats = 10;
  repeated SubHeartbeatMessage heartbeats = 11;
}