syntax = "proto3";
package life;

import "common/enums.proto";

option java_package = "dev.saltt.common.api.proto";
option java_multiple_files = true;

message SurvivalGamesMatchMessage {
  string       match_id = 1;
  int64        start_time_nano_of_day = 3; // LocalTime.toNanoOfDay()
  repeated string players = 4;
}